<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>sqli://cheatsheet</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- TOP BAR -->
        <header class="topbar">
            <div class="topbar-left">
                <span class="status-dot"></span>
                <span class="logo-text">sqli<em>://</em>cheatsheet</span>
            </div>
            <div class="topbar-right">
                <span class="meta-text">v1.0 &middot; cipherKT</span>
                <button
                    class="btn-ghost"
                    id="btn-reset-all"
                    title="Reset all checklists"
                >
                    reset all
                </button>
            </div>
        </header>

        <!-- APP LAYOUT -->
        <div class="app-layout">
            <!-- LEFT: TREE PANEL -->
            <nav
                class="tree-panel"
                id="tree-panel"
                aria-label="Navigation tree"
            >
                <!-- populated by tree.js in Phase 2 -->
                <div class="tree-placeholder">
                    <p class="placeholder-text">tree loads here</p>
                </div>
            </nav>

            <!-- RIGHT: MAIN PANEL -->
            <main class="main-panel" id="main-panel">
                <!-- populated by tree.js / leaf.js in later phases -->
                <div class="main-placeholder">
                    <p class="placeholder-title">select an injection point</p>
                    <p class="placeholder-sub">
                        navigate the tree on the left to reach a payload set
                    </p>
                </div>
            </main>
        </div>

        <script src="data.js"></script>
        <script src="tree.js"></script>
    </body>
</html>
